name: Aggiorna Volley

on:
  workflow_dispatch:

  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

jobs:

  update_corrente:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Installa dipendenze
        run: npm install

      - name: Installa Playwright
        run: npx playwright install --with-deps

      - name: Verifica sintassi
        run: node --check scripts/update.js

      - name: Aggiorna stagione corrente
        run: node scripts/update.js 2026-2027

      - name: Merge archivio
        run: node scripts/merge.js

      - name: Commit e Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add .

          git diff --staged --quiet || git commit -m "Aggiornamento FIPAV"

          git push
