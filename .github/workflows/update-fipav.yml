name: Aggiorna Dati FIPAV

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Esegui script
        run: node scripts/update.js

      - name: Commit modifiche
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add .

          git commit -m "Aggiornamento automatico" || echo "Nessuna modifica"

          git push
