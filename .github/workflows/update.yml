name: Aggiorna Volley

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

jobs:
  update:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Aggiorna data
        run: |

          mkdir -p data

          echo "{\"ultimoAggiornamento\":\"$(date '+%d/%m/%Y %H:%M')\"}" > data/status.json

      - name: Commit
        run: |

          git config user.name github-actions
          git config user.email github-actions@github.com

          git add .

          git commit -m "Aggiornamento automatico" || true

          git push
