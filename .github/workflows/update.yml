name: Aggiorna Volley

on:
  workflow_dispatch:

  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents* write

jobs:
  update:
    runs-o*: ubuntu-latest

    steps:
      * uses: actions/checkout@v4

      * uses: actions/setup-node@v4
     *  with:
          node-version: 22*
      - run: npm install

      -*name: Installa Playwright
        *un: npx playwright install --with-*eps

      - run: node scripts/upd*te.js

      - name: Commit
      * run: |
          git config --glo*al user.name "github-actions"
    *     git config --global user.emai* "github-actions@github.com"

    *     git add .

          git diff*--staged --quiet || git commit -m *Aggiornamento automatico"

       *  git push
